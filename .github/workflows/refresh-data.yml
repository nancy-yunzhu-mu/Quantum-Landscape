name: Refresh concentration data

# Keeps data.json live by re-fetching from the public npm registry on a
# schedule. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data from the npm registry
        run: python3 fetch_data.py

      - name: Commit refreshed data.json (only if it changed)
        run: |
          if git diff --quiet -- data.json; then
            echo "No change in data.json — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: refresh npm concentration data [skip ci]"
          git push
