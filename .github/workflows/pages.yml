name: Deploy dashboard to GitHub Pages

# Publishes the dashboard as a static web page so you can view it in the
# browser at https://<owner>.github.io/<repo>/ — no terminal required.
on:
  push:
    branches:
      - main
      - claude/sample-project-public-data-2fxo23
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (dashboard + committed data snapshot)
        run: |
          mkdir -p _site
          cp web/index.html web/styles.css web/app.js _site/
          cp data.json _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
